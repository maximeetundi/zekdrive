<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF512F" />
      <stop offset="100%" stop-color="#DD2476" />
    </linearGradient>
  </defs>
  <!-- Beautiful Rounded Hexagonal Shield / Circle -->
  <rect width="512" height="512" rx="140" fill="#0b0f19" />
  
  <!-- Sleek outer border with gradient glow -->
  <rect x="20" y="20" width="472" height="472" rx="120" fill="none" stroke="url(#glowGrad)" stroke-width="10" opacity="0.8" />
  
  <!-- Stylized Z representing roads and speed -->
  <path d="M120 140 C120 123.4 133.4 110 150 110 L330 110 C346.6 110 360 123.4 360 140 C360 156.6 346.6 170 330 170 L240 170 L342.4 316.6 C351.8 330.1 352.5 347.8 344.2 362 C335.8 376.2 320.7 385 304.3 385 L150 385 C133.4 385 120 371.6 120 355 C120 338.4 133.4 325 150 325 L230 325 L132.8 186.2 C124.2 173.9 120 159.2 120 144.2 L120 140 Z" fill="url(#glowGrad)" />

  <!-- A bright glowing map-pin/destination node that overlaps the Z path to represent navigation -->
  <path d="M 330 220 C 310 220 290 235 290 260 C 290 290 330 320 330 320 C 330 320 370 290 370 260 C 370 235 350 220 330 220 Z" fill="url(#orangeGrad)" />
  <!-- Inner pin core -->
  <circle cx="330" cy="255" r="10" fill="#0b0f19" />
</svg>
