version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_container
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: guelabledb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

