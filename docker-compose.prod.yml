version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zekdrive_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - zekdrive_net

  redis:
    image: redis:7-alpine
    container_name: zekdrive_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - zekdrive_net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: zekdrive_api
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - zekdrive_net

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: zekdrive_admin
    restart: always
    environment:
      NUXT_PUBLIC_API_URL: https://api.zekdrive.com/api/v1
      NUXT_PUBLIC_WS_URL: wss://api.zekdrive.com/ws
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - zekdrive_net

  vitrine:
    build:
      context: ./vitrine
      dockerfile: Dockerfile
    container_name: zekdrive_vitrine
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - zekdrive_net

  nginx:
    image: nginx:alpine
    container_name: zekdrive_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - admin
      - vitrine
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - zekdrive_net

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  zekdrive_net:
    driver: bridge
