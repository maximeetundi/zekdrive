version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zekdrive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zekdrive}
      POSTGRES_USER: ${POSTGRES_USER:-zekdrive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zekdrive_secret}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-zekdrive}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zekdrive_net

  redis:
    image: redis:7-alpine
    container_name: zekdrive_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zekdrive_net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: builder
    container_name: zekdrive_api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
    ports:
      - '8088:8080'
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: air -c .air.toml
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zekdrive_net

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: zekdrive_admin
    restart: unless-stopped
    env_file: .env
    environment:
      NUXT_PUBLIC_API_URL: https://api.driver.maximeetundi.store/api
      NUXT_PUBLIC_WS_URL: wss://api.driver.maximeetundi.store/ws
    ports:
      - '3003:3001'
    depends_on:
      - api
    networks:
      - zekdrive_net

  vitrine:
    build:
      context: ./vitrine
      dockerfile: Dockerfile
    container_name: zekdrive_vitrine
    restart: unless-stopped
    ports:
      - '3000:3000'
    networks:
      - zekdrive_net

  openwa:
    image: openwa-openwa
    container_name: openwa-api
    restart: unless-stopped
    security_opt:
      - 'no-new-privileges:true'
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 512
    mem_limit: 2g
    ports:
      - '127.0.0.1:2785:2785'
    environment:
      - NODE_ENV=development
      - PORT=2785
      - HOME=/tmp
      - XDG_CONFIG_HOME=/tmp/.config
      - XDG_CACHE_HOME=/tmp/.cache
      - DATABASE_TYPE=sqlite
      - DATABASE_NAME=/app/data/openwa.sqlite
      - DATABASE_SYNCHRONIZE=true
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      - WEBHOOK_TIMEOUT=10000
      - WEBHOOK_MAX_RETRIES=3
      - QUEUE_ENABLED=false
      - WWEBJS_WEB_VERSION=2.2413.51
    volumes:
      - /root/app/OpenWA/data:/app/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2785/api/health/ready']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - zekdrive_net

  nginx:
    image: nginx:alpine
    container_name: zekdrive_nginx
    restart: unless-stopped
    ports:
      - '8082:80'
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - admin
      - vitrine
    networks:
      - zekdrive_net

volumes:
  postgres_data:
  redis_data:

networks:
  zekdrive_net:
    driver: bridge
