# ─────────────────────────────────────────────────────────────────────────────
# Rate limiting zones
# ─────────────────────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;

# ─────────────────────────────────────────────────────────────────────────────
# API upstream — two replicas spawned by docker compose --scale api=2
# ─────────────────────────────────────────────────────────────────────────────
upstream api_upstream {
    least_conn;
    server api:8080;
    keepalive 32;
}

upstream admin_upstream {
    server admin:3001;
    keepalive 16;
}

upstream vitrine_upstream {
    server vitrine:3000;
    keepalive 16;
}

# ─────────────────────────────────────────────────────────────────────────────
# Gzip
# ─────────────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect (zekdrive.com)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name zekdrive.com www.zekdrive.com admin.zekdrive.com api.zekdrive.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# www → apex redirect
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.zekdrive.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    return 301 https://zekdrive.com$request_uri;
}

# ─────────────────────────────────────────────────────────────────────────────
# Vitrine — zekdrive.com (HTTPS)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name zekdrive.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    client_max_body_size 20m;

    access_log  /var/log/nginx/vitrine.access.log;
    error_log   /var/log/nginx/vitrine.error.log warn;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                              always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss://api.zekdrive.com https://api.zekdrive.com;"
        always;

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        limit_req zone=static_limit burst=60 nodelay;
        proxy_pass http://vitrine_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://vitrine_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Admin — admin.zekdrive.com (HTTPS)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.zekdrive.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20m;

    access_log  /var/log/nginx/admin.access.log;
    error_log   /var/log/nginx/admin.error.log warn;

    # Security headers
    add_header X-Frame-Options           "DENY"                                    always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
    add_header Referrer-Policy           "no-referrer"                             always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.zekdrive.com wss://api.zekdrive.com;"
        always;

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        limit_req zone=static_limit burst=60 nodelay;
        proxy_pass http://admin_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# API — api.zekdrive.com (HTTPS)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.zekdrive.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20m;

    access_log  /var/log/nginx/api.access.log;
    error_log   /var/log/nginx/api.error.log warn;

    # Security headers
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "no-referrer"                         always;

    # WebSocket — real-time tracking / chat
    location /ws {
        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Pusher WebSocket Compatibility
    location /app/ {
        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Pusher Auth Compatibility
    location /broadcasting/ {
        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # REST API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        access_log off;
    }
}
